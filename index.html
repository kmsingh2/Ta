<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>AI Chart Analyzer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --green:  #00ff88;
    --red:    #ff3366;
    --blue:   #00cfff;
    --yellow: #ffd700;
    --purple: #b44fff;
    --bg:     #080c14;
    --panel:  #0d1420;
    --border: #1a2535;
    --mono:   'Share Tech Mono', monospace;
    --sans:   'DM Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: #e8f4ff;
    font-family: var(--mono);
    min-height: 100dvh;
    overscroll-behavior: none;
    overflow-x: hidden;
  }

  /* ── Animated BG grid ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(0,207,255,.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,207,255,.05) 1px, transparent 1px);
    background-size: 36px 36px;
    animation: gridMove 5s linear infinite;
  }
  /* Scanline */
  body::after {
    content: '';
    position: fixed; left: 0; right: 0; height: 2px; z-index: 0; pointer-events: none;
    background: linear-gradient(90deg, transparent, rgba(0,207,255,.4), transparent);
    animation: scanline 7s linear infinite;
  }

  @keyframes gridMove { to { background-position: 0 36px; } }
  @keyframes scanline { 0% { top: -2%; } 100% { top: 108%; } }
  @keyframes pulse    { 0%,100% { opacity:1; } 50% { opacity:.3; } }
  @keyframes spin     { to { transform: rotate(360deg); } }
  @keyframes fadeUp   { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:none; } }
  @keyframes barFill  { from { width: 0; } }

  /* ── Header ── */
  #header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(8,12,20,.9);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .badge-live {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(0,207,255,.07); border: 1px solid rgba(0,207,255,.2);
    border-radius: 4px; padding: 2px 10px; margin-bottom: 5px;
    font-size: 9px; letter-spacing: 2px; color: var(--blue);
  }
  .dot-live {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); animation: pulse 1.5s infinite;
  }
  .header-title { font-size: 17px; letter-spacing: 2px; line-height: 1; color: #e8f4ff; }
  .header-title span { color: var(--blue); }

  #btn-reset {
    display: none;
    background: transparent; border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 14px; color: #667;
    font-family: var(--mono); font-size: 11px; letter-spacing: 1px; cursor: pointer;
    transition: border-color .2s, color .2s;
  }
  #btn-reset:hover { border-color: var(--red); color: var(--red); }

  /* ── Main wrap ── */
  #main {
    position: relative; z-index: 1;
    padding: 18px 14px 100px;
    max-width: 520px; margin: 0 auto;
  }

  /* ── Screens ── */
  .screen { display: none; }
  .screen.active { display: block; animation: fadeUp .4s ease; }

  /* ── Drop zone ── */
  #drop-zone {
    border: 2px dashed var(--border); border-radius: 16px;
    padding: 32px 20px; text-align: center; cursor: pointer;
    background: var(--panel); transition: all .3s; margin-bottom: 14px;
  }
  #drop-zone.drag-over {
    border-color: var(--blue); background: rgba(0,207,255,.06);
    box-shadow: 0 0 24px rgba(0,207,255,.2);
  }
  #drop-zone .dz-icon { font-size: 44px; margin-bottom: 12px; }
  #drop-zone p { color: #4a6680; font-size: 14px; margin-bottom: 6px; letter-spacing: 1px; }
  #drop-zone small { color: #2a3a4a; font-size: 11px; line-height: 1.7; }

  /* ── Grid buttons ── */
  .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
  .btn-upload {
    padding: 20px 10px; background: var(--panel);
    border-radius: 14px; font-family: var(--mono);
    font-size: 13px; letter-spacing: 1px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    transition: background .15s, border-color .15s;
  }
  .btn-upload span { font-size: 30px; }
  .btn-gallery { border: 1.5px solid rgba(0,207,255,.3); color: var(--blue); }
  .btn-gallery:active { background: rgba(0,207,255,.12); border-color: var(--blue); }
  .btn-camera  { border: 1.5px solid rgba(180,79,255,.3); color: var(--purple); }
  .btn-camera:active  { background: rgba(180,79,255,.12); border-color: var(--purple); }

  .tip { color: #223344; font-size: 10px; text-align: center; letter-spacing: 1px; line-height: 1.8; }

  /* ── Preview screen ── */
  #preview-wrap {
    border: 1.5px solid rgba(0,255,136,.3); border-radius: 14px;
    overflow: hidden; margin-bottom: 14px;
    box-shadow: 0 0 20px rgba(0,255,136,.1);
  }
  #preview-img {
    width: 100%; max-height: 60vmax; object-fit: contain;
    display: block; background: #0a0f1a;
  }
  .preview-ok { color: var(--green); font-size: 10px; text-align: center; letter-spacing: 1px; margin-bottom: 16px; }

  /* ── Primary CTA ── */
  .btn-analyze {
    width: 100%; padding: 18px;
    background: linear-gradient(135deg, rgba(0,207,255,.13), rgba(180,79,255,.13));
    border: 1.5px solid var(--blue); border-radius: 14px;
    color: var(--blue); font-family: var(--mono);
    font-size: 15px; letter-spacing: 2px; cursor: pointer;
    box-shadow: 0 0 20px rgba(0,207,255,.2);
    margin-bottom: 10px; transition: background .2s, box-shadow .2s;
  }
  .btn-analyze:active { background: rgba(0,207,255,.25); box-shadow: 0 0 30px rgba(0,207,255,.35); }

  .btn-back {
    width: 100%; padding: 13px; background: transparent;
    border: 1px solid var(--border); border-radius: 10px; color: #445;
    font-family: var(--mono); font-size: 11px; letter-spacing: 1px; cursor: pointer;
    transition: border-color .2s, color .2s;
  }
  .btn-back:hover, .btn-back:active { border-color: #334455; color: #667; }

  /* ── Spinner ── */
  #spinner-screen { text-align: center; padding: 48px 0; }
  .spinner {
    width: 48px; height: 48px; margin: 0 auto 14px;
    border: 3px solid var(--border); border-top-color: var(--blue);
    border-radius: 50%; animation: spin .8s linear infinite;
  }
  .spinner-txt { color: var(--blue); font-size: 12px; letter-spacing: 2px; }

  /* ── Error ── */
  #error-box {
    margin-top: 16px; padding: 16px;
    background: rgba(255,51,102,.06); border: 1px solid rgba(255,51,102,.28);
    border-radius: 12px; color: var(--red); font-family: var(--sans);
    font-size: 13px; line-height: 1.6;
  }
  .btn-retry {
    display: inline-block; margin-top: 12px; background: transparent;
    border: 1px solid rgba(255,51,102,.35); border-radius: 8px;
    padding: 9px 16px; color: var(--red); font-family: var(--mono);
    font-size: 11px; cursor: pointer; letter-spacing: 1px;
  }

  /* ── Result card ── */
  #result-card {
    background: var(--panel); border-radius: 16px;
    padding: 20px; margin-top: 16px;
    animation: fadeUp .45s ease;
  }

  .signal-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .signal-lbl { color: #556; font-size: 10px; letter-spacing: 2px; margin-bottom: 4px; }
  .signal-val { font-size: 20px; font-weight: 700; letter-spacing: 1px; }

  /* Signal meter bars */
  .meter { display: flex; gap: 3px; align-items: flex-end; }
  .meter-bar { width: 8px; border-radius: 2px; background: var(--border); }

  /* Confidence */
  .conf-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
  .conf-lbl { color: #556; font-size: 10px; letter-spacing: 1px; }
  .conf-val { font-size: 11px; }
  .conf-track { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 18px; overflow: hidden; }
  .conf-fill  { height: 100%; border-radius: 2px; animation: barFill .9s ease; }

  /* Tags */
  .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .tag {
    display: inline-flex; align-items: center; gap: 5px;
    border-radius: 4px; padding: 3px 10px; font-family: var(--mono);
    font-size: 11px; letter-spacing: 1px; border: 1px solid;
  }
  .tag-dot { width: 6px; height: 6px; border-radius: 50%; }

  .divider { height: 1px; background: var(--border); margin-bottom: 16px; }

  /* Support/Resistance */
  .levels { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .level-box { border-radius: 8px; padding: 10px 12px; }
  .level-lbl { font-size: 9px; letter-spacing: 1px; margin-bottom: 3px; color: #556; }
  .level-val { font-size: 14px; font-family: var(--mono); }

  /* Analysis */
  .analysis-box {
    background: #0a0f1a; border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px; margin-bottom: 14px;
  }
  .analysis-lbl { color: #556; font-size: 9px; letter-spacing: 2px; margin-bottom: 6px; }
  .analysis-txt { color: #ccd6e8; font-size: 13px; line-height: 1.7; font-family: var(--sans); }

  /* Indicators */
  .ind-lbl { color: #556; font-size: 9px; letter-spacing: 2px; margin-bottom: 8px; }
  .ind-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .ind-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 11px; background: #0a0f1a;
    border: 1px solid var(--border); border-radius: 6px;
  }
  .ind-arrow { color: var(--blue); font-size: 11px; }
  .ind-text  { color: #aac4dd; font-size: 12px; font-family: var(--sans); }

  /* Disclaimer */
  .disclaimer {
    padding: 9px 12px; border-radius: 6px; margin-bottom: 16px;
    background: rgba(255,51,102,.03); border: 1px solid rgba(255,51,102,.14);
    color: #ff6688; font-size: 10px; line-height: 1.6;
  }

  .btn-again {
    width: 100%; padding: 14px; background: transparent;
    border: 1.5px solid var(--border); border-radius: 10px; color: #556;
    font-family: var(--mono); font-size: 12px; letter-spacing: 1px; cursor: pointer;
    transition: border-color .2s, color .2s;
  }
  .btn-again:hover, .btn-again:active { border-color: var(--blue); color: var(--blue); }

  .footer { text-align: center; margin-top: 36px; color: #1a2535; font-size: 9px; letter-spacing: 2px; }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div>
    <div class="badge-live">
      <span class="dot-live"></span>
      AI MARKET SCANNER
    </div>
    <div class="header-title">CHART <span>ANALYZER</span></div>
  </div>
  <button id="btn-reset">✕ RESET</button>
</div>

<!-- MAIN -->
<div id="main">

  <!-- SCREEN 1: Upload -->
  <div id="screen-upload" class="screen active">
    <div id="drop-zone">
      <div class="dz-icon">📊</div>
      <p>CHART YAHAN UPLOAD KARO</p>
      <small>Gallery · Camera · Drag &amp; drop · Ctrl+V paste</small>
    </div>

    <input id="input-gallery" type="file" accept="image/*" style="display:none"/>
    <input id="input-camera"  type="file" accept="image/*" capture="environment" style="display:none"/>

    <div class="btn-grid">
      <button class="btn-upload btn-gallery" id="btn-gallery">
        <span>🖼️</span>GALLERY
      </button>
      <button class="btn-upload btn-camera" id="btn-camera">
        <span>📷</span>CAMERA
      </button>
    </div>

    <p class="tip">💡 TradingView, Binance ya koi bhi chart ka screenshot lo</p>
  </div>

  <!-- SCREEN 2: Preview -->
  <div id="screen-preview" class="screen">
    <div id="preview-wrap">
      <img id="preview-img" src="" alt="chart"/>
    </div>
    <p class="preview-ok">✓ CHART READY — Analyze karo!</p>
    <button class="btn-analyze" id="btn-analyze">⚡ AI SE ANALYZE KARO</button>
    <button class="btn-back"    id="btn-back">← WAPAS JAO</button>
  </div>

  <!-- SCREEN 3: Spinner -->
  <div id="screen-spinner" class="screen" style="display:none">
    <div id="spinner-screen">
      <div class="spinner"></div>
      <p class="spinner-txt">AI ANALYZING CHART...</p>
    </div>
  </div>

  <!-- SCREEN 4: Error -->
  <div id="screen-error" class="screen">
    <div id="error-box">
      <span id="error-msg">Analysis fail ho gayi.</span>
      <button class="btn-retry" id="btn-retry">DOBARA TRY KARO</button>
    </div>
  </div>

  <!-- SCREEN 5: Result -->
  <div id="screen-result" class="screen">
    <div id="result-card">
      <!-- Populated by JS -->
    </div>
    <p class="footer">POWERED BY CLAUDE AI · NOT FINANCIAL ADVICE</p>
  </div>

</div><!-- /main -->

<script>
// ── State ──
let imgB64 = null;

// ── DOM refs ──
const screens    = document.querySelectorAll('.screen');
const btnReset   = document.getElementById('btn-reset');
const dropZone   = document.getElementById('drop-zone');
const inputGal   = document.getElementById('input-gallery');
const inputCam   = document.getElementById('input-camera');
const btnGal     = document.getElementById('btn-gallery');
const btnCam     = document.getElementById('btn-camera');
const previewImg = document.getElementById('preview-img');
const btnAnalyze = document.getElementById('btn-analyze');
const btnBack    = document.getElementById('btn-back');
const btnRetry   = document.getElementById('btn-retry');
const errorMsg   = document.getElementById('error-msg');
const resultCard = document.getElementById('result-card');

// ── Screen manager ──
function showScreen(id) {
  screens.forEach(s => {
    s.classList.remove('active');
    s.style.display = 'none';
  });
  const el = document.getElementById('screen-' + id);
  el.style.display = 'block';
  el.classList.add('active');
  btnReset.style.display = (id !== 'upload') ? 'block' : 'none';
}

// ── File processor ──
function processFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => {
    imgB64 = e.target.result.split(',')[1];
    previewImg.src = e.target.result;
    showScreen('preview');
  };
  reader.readAsDataURL(file);
}

// ── Reset ──
function reset() {
  imgB64 = null;
  previewImg.src = '';
  resultCard.innerHTML = '';
  showScreen('upload');
}

// ── Events ──
btnReset.addEventListener('click', reset);
btnBack.addEventListener('click', reset);
btnRetry.addEventListener('click', reset);
btnGal.addEventListener('click', () => inputGal.click());
btnCam.addEventListener('click', () => inputCam.click());
inputGal.addEventListener('change', e => processFile(e.target.files[0]));
inputCam.addEventListener('change', e => processFile(e.target.files[0]));

// Drop zone
dropZone.addEventListener('click', () => inputGal.click());
dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  processFile(e.dataTransfer.files[0]);
});

// Paste (desktop)
document.addEventListener('paste', e => {
  for (const item of e.clipboardData?.items || []) {
    if (item.type.startsWith('image/')) { processFile(item.getAsFile()); break; }
  }
});

// ── API Call ──
btnAnalyze.addEventListener('click', async () => {
  if (!imgB64) return;
  showScreen('spinner');

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `You are an expert technical analyst for crypto and stock markets. Analyze the given chart image and respond ONLY in this exact JSON format (no markdown, no extra text):
{
  "signal": "STRONG_BUY" | "BUY" | "NEUTRAL" | "SELL" | "STRONG_SELL",
  "confidence": <1-100>,
  "asset": "<asset name if visible, else null>",
  "timeframe": "<timeframe if visible, else null>",
  "trend": "UPTREND" | "DOWNTREND" | "SIDEWAYS",
  "pattern": "<chart pattern if detected, else null>",
  "support": "<support level if visible, else null>",
  "resistance": "<resistance level if visible, else null>",
  "summary": "<2-3 sentence Hinglish analysis explaining the signal>",
  "indicators": ["<indicator 1>", "<indicator 2>"]
}`,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: imgB64 } },
            { type: 'text', text: 'Analyze this trading chart and give the signal in required JSON format.' }
          ]
        }]
      })
    });

    const data = await res.json();
    const txt  = (data.content || []).map(b => b.text || '').join('');
    const result = JSON.parse(txt.replace(/```json|```/g, '').trim());
    renderResult(result);
    showScreen('result');

  } catch (err) {
    errorMsg.textContent = 'Analysis fail ho gayi. Chart dobara upload karein ya phir try karein.';
    showScreen('error');
  }
});

// ── Render Result ──
const COL = {
  STRONG_BUY: '#00ff88', BUY: '#88ffbb', NEUTRAL: '#ffd700',
  SELL: '#ff8866', STRONG_SELL: '#ff3366'
};
const LBL = {
  STRONG_BUY: '🚀 STRONG BUY', BUY: '📈 BUY',
  NEUTRAL: '⚖️ NEUTRAL', SELL: '📉 SELL', STRONG_SELL: '🔻 STRONG SELL'
};
const METER_ACTIVE = { STRONG_BUY: 5, BUY: 4, NEUTRAL: 3, SELL: 2, STRONG_SELL: 1 };

function renderResult(r) {
  const col = COL[r.signal] || '#ffd700';
  const active = METER_ACTIVE[r.signal] || 3;

  // Meter bars
  let meterHTML = '';
  for (let i = 0; i < 5; i++) {
    const h = 8 + i * 5;
    const bg = i < active ? col : '#1a2535';
    const shadow = i < active ? `0 0 5px ${col}88` : 'none';
    meterHTML += `<div class="meter-bar" style="height:${h}px;background:${bg};box-shadow:${shadow}"></div>`;
  }

  // Tags
  const tagData = [
    r.asset      ? { label: r.asset,      color: '#00cfff'  } : null,
    r.timeframe  ? { label: r.timeframe,  color: '#b44fff'  } : null,
    r.trend      ? { label: r.trend,      color: col        } : null,
    r.pattern    ? { label: r.pattern,    color: '#ffd700'  } : null,
  ].filter(Boolean);

  let tagsHTML = tagData.map(t => `
    <span class="tag" style="background:${t.color}18;border-color:${t.color}55;color:${t.color}">
      <span class="tag-dot" style="background:${t.color}"></span>${t.label}
    </span>`).join('');

  // Levels
  let levelsHTML = '';
  if (r.support || r.resistance) {
    levelsHTML = `<div class="levels">`;
    if (r.support) levelsHTML += `
      <div class="level-box" style="background:rgba(0,255,136,.06);border:1px solid rgba(0,255,136,.2)">
        <div class="level-lbl">SUPPORT</div>
        <div class="level-val" style="color:var(--green)">${r.support}</div>
      </div>`;
    if (r.resistance) levelsHTML += `
      <div class="level-box" style="background:rgba(255,51,102,.06);border:1px solid rgba(255,51,102,.2)">
        <div class="level-lbl">RESISTANCE</div>
        <div class="level-val" style="color:var(--red)">${r.resistance}</div>
      </div>`;
    levelsHTML += `</div>`;
  }

  // Indicators
  let indsHTML = '';
  if (r.indicators && r.indicators.length) {
    indsHTML = `<div class="ind-lbl">INDICATORS</div><div class="ind-list">` +
      r.indicators.map(i => `
        <div class="ind-item">
          <span class="ind-arrow">▸</span>
          <span class="ind-text">${i}</span>
        </div>`).join('') +
      `</div>`;
  }

  resultCard.style.border = `1px solid ${col}55`;
  resultCard.style.boxShadow = `0 0 32px ${col}1a`;

  resultCard.innerHTML = `
    <div class="signal-row">
      <div>
        <div class="signal-lbl">AI SIGNAL</div>
        <div class="signal-val" style="color:${col}">${LBL[r.signal] || r.signal}</div>
      </div>
      <div class="meter">${meterHTML}</div>
    </div>

    <div class="conf-row">
      <span class="conf-lbl">CONFIDENCE</span>
      <span class="conf-val" style="color:${col}">${r.confidence}%</span>
    </div>
    <div class="conf-track">
      <div class="conf-fill" style="width:${r.confidence}%;background:linear-gradient(90deg,${col}88,${col});box-shadow:0 0 8px ${col}"></div>
    </div>

    <div class="tags">${tagsHTML}</div>

    <div class="divider"></div>

    ${levelsHTML}

    <div class="analysis-box">
      <div class="analysis-lbl">ANALYSIS</div>
      <div class="analysis-txt">${r.summary}</div>
    </div>

    ${indsHTML}

    <div class="disclaimer">⚠ Yeh sirf AI analysis hai, financial advice nahi. Trading mein risk hota hai.</div>

    <button class="btn-again" onclick="reset()">↩ DOBARA ANALYZE KARO</button>
  `;
}

// Init
showScreen('upload');
</script>
</body>
</html>
